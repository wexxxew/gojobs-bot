name: check vacancies

on:
  schedule:
    - cron: "*/30 * * * *" # каждые 30 минут (GitHub может задерживать на 5-15 мин)
  workflow_dispatch: {} # и кнопка ручного запуска во вкладке Actions

permissions:
  contents: write # чтобы коммитить seen.json обратно

concurrency:
  group: check
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: go run ./cmd/bot

      - name: commit seen.json
        run: |
          git config user.name "gojobs-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "update seen.json [skip ci]"
          git pull --rebase
          git push
